<!DOCTYPE html>
<html>
<head>

    <meta charset="utf-8">
    <title>Validador de Ticket</title>

    <link rel="manifest" href="/pwa/manifest.json">
    <meta name="theme-color" content="#2c3e50">

    <script src="https://unpkg.com/html5-qrcode"></script>

    <style>

        body {
            margin: 0;
            font-family: Arial, Helvetica, sans-serif;
        }
          
        /* HEADER */
          
        .header {
            background: #2c3e50;
            color: white;
            display: flex;
            align-items: center;
            padding: 20px;
        }

            .header img {
                width: 70px;
                height: 70px;
                margin-right: 20px;
            }

            .header h1 {
                font-size: 48px;
                margin: 0;
            }

        /* AREA PRINCIPAL */

        .main {
            position: relative;
            height: calc(100vh - 110px);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            padding-top: 80px;
            overflow: hidden;
        }

            /* IMAGEN FONDO */

            .main::before {
                content: "";
                position: absolute;
                top: 0;
                left: 0;
                width: 100%;
                height: 100%;
                background: url("/pwa/entrada_estacionamiento.png");
                background-size: cover;
                background-position: center;
                filter: blur(6px) brightness(0.7);
                z-index: 0;
            }

        /* CONTENIDO SOBRE LA IMAGEN */

        .content {
            position: relative;
            z-index: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* BOTON ESCANEO */

        .scan-btn {
            font-size: 48px;
            padding: 40px 80px;
            border: none;
            border-radius: 20px;
            background: #3498db;
            color: white;
            box-shadow: 0 6px 15px rgba(0,0,0,0.3);
        }

        /* CAMARA */

        #reader {
            width: 400px;
            margin-top: 40px;
        }

        /* MENSAJE */

        #mensaje {
            margin-top: 40px;
            font-size: 48px;
            color: #00ff88;
            display: none;
        }
    </style>

</head>

<body>

    <div class="header">

        <img src="/pwa/icon-192.png">

        <h1>Validador de Ticket</h1>

    </div>

    <div class="main">

        <div class="content">

            <button class="scan-btn" onclick="iniciarEscaneo()">
                ESCANEAR TICKET
            </button>

            <div id="reader"></div>

            <div id="mensaje">
                ✔ Ticket validado
            </div>

        </div>

    </div>

    <script>

        let escaneado = false;

        async function enviarLectura(texto) {

            await fetch("/api/log", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({
                    message: "QR leído: " + texto
                })
            });

        }

        function iniciarEscaneo() {

            const scanner = new Html5QrcodeScanner(
                "reader",
                { fps: 10, qrbox: 300 }
            );

            scanner.render(async (decodedText) => {

                if (escaneado) return;

                escaneado = true;

                if (navigator.vibrate) {
                    navigator.vibrate(200);
                }

                await enviarLectura(decodedText);

                document.getElementById("mensaje").style.display = "block";

                scanner.clear();

            });

        }

        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('/pwa/service-worker.js');
        }

    </script>

</body>
</html>
